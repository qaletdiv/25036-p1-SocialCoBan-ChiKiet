<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân – Kircle</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components/logo.css">
    <link rel="stylesheet" href="../css/components/button.css">
    <link rel="stylesheet" href="../css/components/card.css">
    <link rel="stylesheet" href="../css/components/form.css">
    <link rel="stylesheet" href="../css/components/post.css">
    <link rel="stylesheet" href="../css/components/profile.css">
    <link rel="stylesheet" href="../css/components/table.css">
    <link rel="stylesheet" href="../css/components/user-search.css">
    <script src="../js/theme.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body class="kircle-app">
    <header class="kircle-header">
        <div class="kircle-header-inner">
            <button type="button" class="kircle-sidebar-toggle" id="sidebar-toggle" aria-label="Mở menu điều hướng" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <a href="news.html" class="kircle-logo-link kircle-header-logo" aria-label="Kircle">
                <svg class="kircle-header-logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <defs>
                        <linearGradient id="kircleHeaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color: #a29bfe; stop-opacity: 1" />
                            <stop offset="100%" style="stop-color: #6c5ce7; stop-opacity: 1" />
                        </linearGradient>
                    </defs>
                    <g transform="translate(10, 10)">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" opacity="0.25" />
                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#kircleHeaderGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="210 100" />
                        <path d="M42 35 L42 65 M42 50 L58 35 M42 50 L58 65" stroke="url(#kircleHeaderGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                    </g>
                </svg>
            </a>
            <button
                type="button"
                class="kircle-header-icon-btn kircle-header-search-toggle"
                id="mobile-search-toggle"
                aria-label="Tìm kiếm"
            >
                <span class="kircle-header-search-toggle-icon-search" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16" y1="16" x2="21" y2="21"></line>
                    </svg>
                </span>
                <span class="kircle-header-search-toggle-icon-close" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </span>
            </button>
            <div class="kircle-header-search">
                <input
                    type="search"
                    id="profile-search"
                    class="kircle-input"
                    placeholder="Tìm kiếm..."
                    style="width: 100%; font-size: 0.875rem; padding: 0.35rem 0.5rem;"
                >
            </div>
            <div class="kircle-header-actions">
                <button type="button" class="kircle-header-icon-btn kircle-theme-toggle" id="theme-toggle" aria-label="Đổi giao diện sáng/tối">
                    <span class="kircle-theme-icon kircle-theme-icon-sun" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    </span>
                    <span class="kircle-theme-icon kircle-theme-icon-moon" aria-hidden="true">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </span>
                </button>
                <button type="button" class="kircle-header-icon-btn kircle-header-notif" id="notif-link" aria-label="Thông báo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span
                        id="notif-badge"
                        class="kircle-badge kircle-badge-pending kircle-header-notif-badge"
                        style="display: none;"
                    ></span>
                </button>
                <div class="kircle-dropdown-wrap">
                    <button type="button" class="kircle-dropdown-trigger" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">
                        <img src="" alt="" class="kircle-header-avatar" id="header-avatar" width="36" height="36" style="background: var(--surface-2);">
                        <span id="header-username"></span>
                    </button>
                    <div class="kircle-dropdown-menu" id="user-menu" role="menu">
                        <a href="profile.html" role="menuitem">Hồ sơ</a>
                        <a href="../index.html" role="menuitem">Về trang chủ</a>
                        <button type="button" id="logout-btn" role="menuitem">Đăng xuất</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <div class="kircle-sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
    <div class="kircle-main-wrap">
        <aside class="kircle-sidebar" id="sidebar" aria-label="Điều hướng">
            <nav class="kircle-sidebar-nav">
                <a href="news.html">Bảng feed</a>
                <a href="profile.html" class="is-active">Hồ sơ</a>
                <a href="#">Tin nhắn</a>
                <a href="#">Thông báo</a>
            </nav>
        </aside>
        <main class="kircle-main">
            <div class="kircle-profile-wrap">
                <div class="kircle-profile-hero kircle-card">
                    <div class="kircle-profile-avatar-outer">
                        <div id="profile-avatar-display"></div>
                        <button
                            type="button"
                            class="kircle-btn kircle-btn-secondary kircle-btn-sm kircle-profile-edit-btn"
                            id="edit-profile-btn"
                        >Chỉnh sửa hồ sơ</button>
                    </div>
                    <div class="kircle-profile-info" id="profile-info"></div>
                    <div class="kircle-profile-stats" id="profile-stats"></div>
                </div>

                <div class="kircle-profile-edit-card" id="edit-profile-card" style="display: none;">
                    <h2 class="kircle-profile-edit-title">Chỉnh sửa hồ sơ</h2>

                    <div class="kircle-form-group">
                        <label class="kircle-label">Ảnh đại diện</label>
                        <div class="kircle-profile-edit-avatar-preview-wrap">
                            <div id="edit-avatar-preview-wrap"></div>
                            <div style="flex: 1;">
                                <div class="kircle-profile-edit-row">
                                    <input
                                        type="url"
                                        id="edit-avatar-url"
                                        class="kircle-input"
                                        placeholder="Dán đường dẫn ảnh đại diện..."
                                        autocomplete="off"
                                        spellcheck="false"
                                        style="flex: 1;"
                                    >
                                    <button type="button" class="kircle-btn kircle-btn-secondary kircle-btn-sm" id="edit-avatar-clear">Xóa</button>
                                </div>
                                <p class="kircle-profile-edit-error" id="edit-avatar-error" style="display:none;"></p>
                            </div>
                        </div>
                    </div>

                    <div class="kircle-form-group">
                        <label class="kircle-label" for="edit-fullname">Tên hiển thị</label>
                        <input
                            type="text"
                            id="edit-fullname"
                            class="kircle-input"
                            placeholder="Nhập tên hiển thị..."
                            maxlength="60"
                            autocomplete="off"
                        >
                        <p class="kircle-profile-edit-error" id="edit-fullname-error" style="display:none;"></p>
                    </div>

                    <div class="kircle-form-group">
                        <label class="kircle-label" for="edit-bio">Tiểu sử</label>
                        <textarea
                            id="edit-bio"
                            class="kircle-input"
                            placeholder="Viết một vài điều về bản thân..."
                            rows="3"
                            maxlength="200"
                            style="resize: vertical;"
                        ></textarea>
                        <p style="font-size: 0.75rem; color: var(--text-muted); text-align: right; margin: 0.2rem 0 0;" id="edit-bio-counter">0 / 200</p>
                    </div>

                    <div id="edit-save-feedback" style="display:none; font-size: 0.875rem; margin-top: 0.5rem;"></div>

                    <div class="kircle-profile-edit-actions">
                        <button type="button" class="kircle-btn kircle-btn-secondary kircle-btn-sm" id="edit-cancel-btn">Hủy</button>
                        <button type="button" class="kircle-btn kircle-btn-primary kircle-btn-sm" id="edit-save-btn">Lưu thay đổi</button>
                    </div>
                </div>

                <div id="profile-posts-section"></div>
            </div>
        </main>
    </div>
    <footer class="kircle-footer">
        <div class="kircle-footer-inner">
            <div class="kircle-footer-body">
                <div class="kircle-footer-info">
                    <span class="kircle-footer-brand">Kircle</span>
                    <nav class="kircle-footer-nav">
                        <a href="#">Giới thiệu</a>
                        <a href="#">Điều khoản</a>
                        <a href="#">Quyền riêng tư</a>
                        <a href="#">Liên hệ</a>
                    </nav>
                    <ul class="kircle-footer-contact">
                        <li>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            693 Đ. Lê Văn Việt, P. Tăng Nhơn Phú, Hồ Chí Minh
                        </li>
                        <li>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <a href="mailto:kiettc15@gmail.com">kiettc15@gmail.com</a>
                        </li>
                        <li>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 5.45 5.45l.96-.96a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <a href="tel:0362618624">0362 618 624</a>
                        </li>
                    </ul>
                </div>
                <div class="kircle-footer-map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3724.6049591401515!2d106.81056597480607!3d10.850400689302932!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3175274a373d1489%3A0x55fdeb0eba430d7e!2zNjkzIMSQLiBMw6ogVsSDbiBWaeG7h3QsIFAsIFTEg25nIE5oxqFuIFBow7osIEjhu5MgQ2jDrSBNaW5oLCBWaeG7h3QgTmFt!5e1!3m2!1svi!2s!4v1775413473640!5m2!1svi!2s" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
            <div class="kircle-footer-bottom">© 2026 Kircle. Bảo lưu mọi quyền.</div>
        </div>
    </footer>
    <script src="../js/db.js"></script>
    <script src="../js/mock/users.js"></script>
    <script src="../js/mock/posts.js"></script>
    <script src="../js/mock/comments.js"></script>
    <script src="../js/mock/notifications.js"></script>
    <script src="../js/mock/reports.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/router-utils.js"></script>
    <script src="../js/user-search.js"></script>
    <script src="../js/profile-page.js"></script>
    <script>KircleUserSearch.init("profile-search");</script>
</body>
</html>
