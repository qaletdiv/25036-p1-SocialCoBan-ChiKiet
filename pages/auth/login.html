<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – Kircle</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/themes.css">
    <link rel="stylesheet" href="../../css/layout.css">

    <link rel="stylesheet" href="../../css/components/logo.css">
    <link rel="stylesheet" href="../../css/components/button.css">
    <link rel="stylesheet" href="../../css/components/form.css">
    <link rel="stylesheet" href="../../css/components/card.css">
    <script src="../../js/theme.js"></script>
</head>
<body class="kircle-auth-page">
    <div class="container" style="max-width: 400px; width: 100%; padding: 1rem;">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <a href="../../index.html" class="kircle-logo-link" style="font-size: 1.5rem;">Kircle</a>
        </div>
        <div class="kircle-card">
            <div class="kircle-card-body">
                <h1 class="kircle-card-title" style="margin-bottom: 1rem;">Đăng nhập</h1>
                <form id="login-form" class="kircle-form">
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="login-email">Email</label>
                        <input type="email" id="login-email" class="kircle-input" required placeholder="email@example.com" autocomplete="email">
                    </div>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="login-password">Mật khẩu</label>
                        <input type="password" id="login-password" class="kircle-input" required placeholder="••••••••" autocomplete="current-password">
                    </div>
                    <p id="login-error" class="kircle-form-error" style="display: none;"></p>
                    <div class="kircle-form-group" style="margin-top: 1.25rem;">
                        <button type="submit" class="kircle-btn kircle-btn-primary" style="width: 100%;">Đăng nhập</button>
                    </div>
                </form>
                <p style="margin: 1rem 0 0; font-size: 0.875rem; color: var(--text-muted);">
                    Chưa có tài khoản? <a href="register.html">Đăng ký</a>
                </p>
            </div>
        </div>
    </div>
    <script src="../../js/db.js"></script>
    <script>KircleDB.init();</script>
    <script src="../../js/mock/users.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/router-utils.js"></script>
    <script src="../../js/login-page.js"></script>

</body>
</html>
