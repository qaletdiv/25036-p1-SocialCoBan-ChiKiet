<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký – Kircle</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/themes.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/components/logo.css">
    <link rel="stylesheet" href="../../css/components/button.css">
    <link rel="stylesheet" href="../../css/components/form.css">
    <link rel="stylesheet" href="../../css/components/card.css">
    <script src="../../js/theme.js"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin: 2rem auto; padding: 1rem;">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <a href="../../index.html" class="kircle-logo-link" style="font-size: 1.5rem;">Kircle</a>
        </div>
        <div class="kircle-card">
            <div class="kircle-card-body">
                <h1 class="kircle-card-title" style="margin-bottom: 1rem;">Đăng ký</h1>
                <form id="register-form" class="kircle-form" novalidate>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="reg-fullname">Họ tên</label>
                        <input type="text" id="reg-fullname" class="kircle-input" required minlength="2" placeholder="Nguyễn Văn A" autocomplete="name">
                    </div>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="reg-email">Email</label>
                        <input type="email" id="reg-email" class="kircle-input" required placeholder="email@example.com" autocomplete="email">
                    </div>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="reg-phone">Số điện thoại</label>
                        <input type="tel" id="reg-phone" class="kircle-input" required placeholder="0912 345 678" autocomplete="tel">
                    </div>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="reg-password">Mật khẩu</label>
                        <input type="password" id="reg-password" class="kircle-input" required minlength="6" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <div class="kircle-form-group">
                        <label class="kircle-label" for="reg-confirm-password">Nhập lại mật khẩu</label>
                        <input type="password" id="reg-confirm-password" class="kircle-input" required placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <p id="register-error" class="kircle-form-error" style="display: none;"></p>
                    <div class="kircle-form-group" style="margin-top: 1.25rem;">
                        <button type="submit" class="kircle-btn kircle-btn-primary" style="width: 100%;">Đăng ký</button>
                    </div>
                </form>
                <p style="margin: 1rem 0 0; font-size: 0.875rem; color: var(--text-muted);">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
    <script src="../../js/db.js"></script>
    <script src="../../js/mock/users.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/router-utils.js"></script>
    <script src="../../js/register-page.js"></script>
</body>
</html>
