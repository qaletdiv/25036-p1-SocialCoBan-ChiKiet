<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kircle - Kết nối & Sáng tạo</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components/logo.css">
    <link rel="stylesheet" href="css/components/button.css">
    <script src="js/theme.js"></script>
</head>
<body class="kircle-landing">
    <div class="container" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;">
        <a href="index.html" id="kircle-logo-link" style="display: block; margin-bottom: 2rem;">
            <svg id="kircle-svg" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="kircleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color: #a29bfe; stop-opacity: 1" />
                        <stop offset="100%" style="stop-color: #6c5ce7; stop-opacity: 1" />
                    </linearGradient>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>
                <g transform="translate(10, 10)">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#f0f0f0" stroke-width="2" />
                    <circle class="main-circle" cx="50" cy="50" r="45" fill="none" stroke="url(#kircleGradient)"
                        stroke-width="10" stroke-linecap="round" stroke-dasharray="210 100" />
                    <path class="k-path" d="M42 35 L42 65 M42 50 L58 35 M42 50 L58 65" stroke="url(#kircleGradient)"
                        stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
                </g>
                <text x="130" y="70" class="brand-name" font-size="55" font-weight="800" letter-spacing="-1">Kircle</text>
                <text x="132" y="95" class="brand-tagline" font-size="16" font-weight="500" letter-spacing="2">KẾT NỐI & SÁNG TẠO</text>
            </svg>
        </a>
        <p style="margin: 0 0 2rem; color: var(--text-muted); text-align: center;">Mạng xã hội kết nối và sáng tạo.</p>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
            <a href="pages/auth/login.html" class="kircle-btn kircle-btn-primary kircle-btn-lg" style="min-width: 140px;">Đăng nhập</a>
            <a href="pages/auth/register.html" class="kircle-btn kircle-btn-secondary kircle-btn-lg" style="min-width: 140px;">Đăng ký</a>
        </div>
    </div>
    <script src="js/db.js"></script>
    <script>KircleDB.init();</script>
    <script src="js/auth.js"></script>
    <script src="js/router-utils.js"></script>
    <script src="js/index-page.js"></script>

</body>
</html>
